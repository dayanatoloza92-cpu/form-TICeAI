<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Linea TIC e AI</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================================= -->
    <!-- FORMULARIO -->
    <!-- ================================= -->

    <section id="formulario">

        <div class="card">

            <img src="img/logo.webp" class="logo" alt="Logo">

            <h1>Bienvenido</h1>

            <p>
                Completa el siguiente formulario para iniciar el taller.
            </p>

            <input
                type="text"
                id="nombre"
                placeholder="Nombre">

            <input
                type="text"
                id="documento"
                placeholder="Documento">

            <input
                type="email"
                id="correo"
                placeholder="Correo">

            <input
                type="text"
                id="area"
                placeholder="Área">

            <button id="btnComenzar">

                Iniciando

            </button>

        </div>

    </section>



    <!-- ================================= -->
    <!-- CARGA -->
    <!-- ================================= -->

    <section id="carga">

        <div class="panel">

            <h1 id="tituloCarga">

                Analizando información...

            </h1>

            <p id="subtitulo">

                Espere un momento

            </p>

            <div id="barra">

                <div id="progreso"></div>

            </div>

            <span id="porcentaje">

                0%

            </span>

        </div>

    </section>



    <!-- ================================= -->
    <!-- ESCENA DE CAOS -->
    <!-- ================================= -->

    <section id="caos">

        <div id="flash"></div>

        <div id="scanlines"></div>

        <div id="ruido"></div>

        <div id="glitch1"></div>

        <div id="glitch2"></div>

        <div id="particulas"></div>

        <h1 id="hackeado">

            HAS SIDO HACKEADO

        </h1>

    </section>



    <!-- ================================= -->
    <!-- AVATAR -->
    <!-- ================================= -->

    <section id="avatar">

        <video
            id="avatar-video"
            autoplay
            muted
            playsinline>

            <source
                src="video/video_avatar.mp4"
                type="video/mp4">

        </video>

        <div id="mensajeFinal">

            <h1>

                Bienvenido a la Línea TIC & AI

            </h1>

            <p>

                Espero la pases bien...

            </p>

            <p>

                Esta fue únicamente una simulación de concientización.

            </p>

            <p>

                Ningún dato fue enviado ni almacenado.

            </p>

        </div>

    </section>



    <script src="script.js"></script>

</body>

</html>
